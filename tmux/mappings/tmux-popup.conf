# Serie of useful tmux popup commands

# Open zsh shell with "z"
unbind-key space
bind-key -r space popup -x R -y 0 -d "#{pane_current_path}" \
    zsh -c ".tmp/popup 2>/dev/null || echo \"No $(pwd)/.tmp/popup\""

# Kill process on a port: opens popup, prompts for port, fzf picker, kill.
bind-key P popup -E -w 50% -h 40% -b rounded \
    "~/.dotfiles/tmux/scripts/kill-port.sh"
