# Copy selection -> edit in $EDITOR (popup) -> run as shell command.
#
# Works in copy-mode-vi after you've started a selection (v) and highlighted text.
#   x   : grab the selection, open a Vim popup prefilled with it, run the
#         edited buffer as a shell command in the current pane on :wq.
#
# Empty selection or empty edit -> nothing happens.
#
# NOTE: copy-pipe-AND-CANCEL dismisses copy mode first so the popup can render.
#       Without -and-cancel the popup never shows (copy mode holds the pane).

bind-key -T copy-mode-vi x send-keys -X copy-pipe-and-cancel "/Users/cristianoliveira/.dotfiles/tmux/scripts/copy-to-command.sh #{pane_id}"
